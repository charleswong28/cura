query Candidates(
  $first: Int
  $after: String
  $last: Int
  $before: String
  $filter: CandidateFilterInput
  $sortBy: CandidateSortField
  $sortOrder: SortOrder
) {
  candidates(
    first: $first
    after: $after
    last: $last
    before: $before
    filter: $filter
    sortBy: $sortBy
    sortOrder: $sortOrder
  ) {
    edges {
      cursor
      node {
        ...CandidateFields
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

query Candidate($id: ID!) {
  candidate(id: $id) {
    ...CandidateFields
  }
}

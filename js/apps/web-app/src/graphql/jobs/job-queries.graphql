query Jobs(
  $first: Int
  $after: String
  $search: String
  $status: JobStatus
  $priority: JobPriority
  $sortBy: String
  $sortOrder: String
) {
  jobs(
    first: $first
    after: $after
    search: $search
    status: $status
    priority: $priority
    sortBy: $sortBy
    sortOrder: $sortOrder
  ) {
    edges {
      cursor
      node {
        ...JobFields
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}

query Job($id: ID!) {
  job(id: $id) {
    ...JobFields
  }
}
